<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS V2000 | CORE</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --dark: #0a0a0a; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Courier New', monospace; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; background: radial-gradient(circle, var(--neon) 1%, transparent 10%); background-size: 30px 30px; }
        
        .panel { 
            border: 2px solid var(--neon); padding: 40px; background: var(--dark); 
            width: 90%; max-width: 450px; text-align: center; 
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2); border-radius: 2px;
            position: relative;
        }
        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; margin: 0 0 10px 0; font-size: 1.5rem; }
        .version { font-size: 0.7rem; color: var(--neon); opacity: 0.6; display: block; margin-bottom: 30px; }

        .btn-nitro { 
            background: var(--neon); color: #000; border: none; padding: 25px; width: 100%; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.2rem;
            box-shadow: 0 0 20px var(--neon); transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-nitro:active { transform: scale(0.95); box-shadow: 0 0 5px var(--neon); }

        #engine-room { display: none; margin-top: 30px; }
        .spinner { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-msg { color: var(--neon); font-size: 0.8rem; letter-spacing: 1px; line-height: 1.5; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .footer-info { margin-top: 20px; font-size: 0.6rem; color: #444; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="panel">
        <span class="version">SISTEMA OPERATIVO V2000</span>
        <h1>MALLY CUTS</h1>
        
        <form id="v2k-form" action="/api/brutal-process" method="POST" enctype="multipart/form-data">
            <input type="file" name="video_file" id="file-picker" accept="video/*" style="display: none;" onchange="ignite()">
            <button type="button" class="btn-nitro" id="launch-btn" onclick="document.getElementById('file-picker').click()">
                ⚡ DISPARAR VIDEO ⚡
            </button>
        </form>

        <div id="engine-room">
            <div class="spinner"></div>
            <div class="status-msg">
                <span class="blink">PROCESO ASÍNCRONO ACTIVADO</span><br>
                FRAGMENTANDO EN 60s...<br>
                SUBIENDO A TELEGRAM...
            </div>
        </div>

        <div class="footer-info">
            AUTO-CLEAN: ON | TARGET: @IMPERIO_MP | CORES: DETECTED
        </div>
    </div>

    <script>
        function ignite() {
            const file = document.getElementById('file-picker').files[0];
            if (file) {
                // UI Switch
                document.getElementById('launch-btn').style.display = 'none';
                document.getElementById('engine-room').style.display = 'block';
                
                // Enviar formulario (V2000 gestiona el resto en el servidor)
                document.getElementById('v2k-form').submit();
                
                // Reset automático después de 5 segundos para permitir otro envío
                setTimeout(() => {
                    document.getElementById('launch-btn').style.display = 'block';
                    document.getElementById('engine-room').style.display = 'none';
                    document.getElementById('v2k-form').reset();
                }, 8000);
            }
        }
    </script>
</body>
</html>
