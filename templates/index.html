<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Cutter Khasam</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Video Cutter Khasam</h1>
        <input type="file" id="videoInput" accept="video/*">
        <select id="chapterDuration">
            {% for c in chapter_options %}
            <option value="{{c}}">{{c}}s por capítulo</option>
            {% endfor %}
        </select>
        <button id="uploadBtn">Subir</button>
        <button id="cutBtn">Cortar</button>
        <button id="clearBtn">Limpiar Descargas</button>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <div id="downloads"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
