<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Khasam Cutter PRO</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🎬 Khasam Cutter PRO</h1>

<form method="post" enctype="multipart/form-data">
    <input type="file" name="files" multiple required>

    <label>Duración por clip:</label>
    <select name="duration">
        <option value="15">15 segundos</option>
        <option value="30">30 segundos</option>
        <option value="60">60 segundos</option>
    </select>

    <button type="submit">🚀 CREAR VIDEOS</button>
</form>

<h2>📂 Videos generados:</h2>
<ul>
{% for video in videos %}
<li><a href="/download/{{video}}">{{video}}</a></li>
{% endfor %}
</ul>

<h2>🕒 Historial</h2>
<ul>
{% for item in historial %}
<li>
🎥 {{item.video}} | ⏱ {{item.duracion}}s | 🎬 {{item.clips}} clips | 📅 {{item.fecha}}
</li>
{% endfor %}
</ul>

</body>
</html>
