<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Khasam Auto Cutter</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🎬 Cortador Automático (15s)</h1>

<form method="post" enctype="multipart/form-data">
    <input type="file" name="files" multiple required>
    <button type="submit">Cortar Automáticamente</button>
</form>

<h2>📂 Videos generados:</h2>

<ul>
{% for video in videos %}
<li><a href="/download/{{video}}">{{video}}</a></li>
{% endfor %}
</ul>

</body>
</html>
