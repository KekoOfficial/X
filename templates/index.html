<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cortador de Vídeos Khasam</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>🎬 Cortador de Vídeos Khasam</h1>
    
    <div class="form-section">
        <label>Selecciona vídeos (MP4):</label>
        <input type="file" id="videos" multiple>
        
        <label>Duración de cada capítulo (segundos):</label>
        <select id="cap_duration">
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">60s</option>
        </select>
        
        <button id="btn_cortar">Cortar Vídeos</button>
    </div>
    
    <div class="progress-section">
        <div id="progress_bar"><div id="progress_fill"></div></div>
        <span id="progress_text"></span>
    </div>
    
    <div class="history">
        <h2>Vídeos cortados:</h2>
        <ul id="video_list">
            {% for video in videos %}
            <li><a href="/download/{{ video }}">{{ video }}</a></li>
            {% endfor %}
        </ul>
    </div>
    
    <div class="actions">
        <button id="clear_history">Borrar Historial</button>
        <button id="clear_folder">Borrar Carpeta</button>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
