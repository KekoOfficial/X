<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS | INSTANT-FIRE</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 2px solid var(--neon); padding: 40px; background: #0a0a0a; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px var(--neon); }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--neon); color: #fff; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .btn-fire { background: var(--neon); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 20px; color: var(--neon); display: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MASTER VIDEO</h1>
        <p style="font-size: 0.6rem; color: #666;">> NOMBRE DEL VIDEO EN /media/raw/</p>
        
        <input type="text" id="video-name" placeholder="maestro.mp4" required>
        <button class="btn-fire" onclick="fireNow()">🔥 DISPARAR MOTOR</button>

        <div id="status">🚀 MOTOR V10 EN MARCHA... <br>REVISA TU CANAL DE TELEGRAM</div>
    </div>

    <script>
        function fireNow() {
            const name = document.getElementById('video-name').value;
            if(!name) return alert("Escribe el nombre del archivo");
            
            document.getElementById('status').style.display = 'block';
            fetch('/api/direct-fire', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename: name})
            });
        }
    </script>
</body>
</html>
