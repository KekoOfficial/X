<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS v18.5 | NITRO</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .panel { border: 2px solid var(--neon); padding: 50px; background: #0a0a0a; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0,255,65,0.4); border-radius: 5px; }
        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 4px; margin-bottom: 40px; font-size: 1.8rem; }
        .btn-mally { 
            background: var(--neon); color: #000; border: none; padding: 25px; width: 100%; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.2rem;
            box-shadow: 0 0 15px var(--neon); transition: 0.2s;
        }
        .btn-mally:active { transform: scale(0.96); box-shadow: 0 0 5px var(--neon); }
        #status { display: none; margin-top: 30px; }
        .spinner { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .log-text { color: var(--neon); font-size: 0.75rem; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MASTER VIDEO</h1>
        <form id="nitro-form" action="/api/process" method="POST" enctype="multipart/form-data">
            <input type="file" name="video_file" id="video-input" accept="video/*" style="display: none;" onchange="ignite()">
            <button type="button" class="btn-mally" id="main-btn" onclick="document.getElementById('video-input').click()">
                🎬 SELECCIONAR Y DISPARAR
            </button>
        </form>

        <div id="status">
            <div class="spinner"></div>
            <p class="log-text">MOTOR V10 ACTIVADO<br>FRAGMENTANDO EN 60s Y ENVIANDO...</p>
        </div>
    </div>

    <script>
        function ignite() {
            if (document.getElementById('video-input').files[0]) {
                document.getElementById('main-btn').style.display = 'none';
                document.getElementById('status').style.display = 'block';
                document.getElementById('nitro-form').submit();
            }
        }
    </script>
</body>
</html>
