<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cortador de Vídeos Khasam</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>🎬 Cortador de Vídeos Khasam</h1>

    <div class="form-section">
        <label>Selecciona vídeo (MP4):</label>
        <input type="file" id="file">
        
        <label>Duración de capítulo (segundos):</label>
        <select id="cap_duration">
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">60s</option>
        </select>

        <button id="cut_btn">Crear Capítulos</button>
    </div>

    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill" id="progress_fill"></div>
        </div>
        <p id="progress_text">0%</p>
    </div>

    <div class="historial-section">
        <h2>Historial</h2>
        <button id="clear_hist">Clear Historial</button>
        <button id="clear_folder">Clear Carpeta</button>
        <ul id="hist_list"></ul>
    </div>

</div>
<script src="/static/script.js"></script>
</body>
</html>
