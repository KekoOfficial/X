<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cortador de Vídeos Khasam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>🎬 Cortador de Vídeos Khasam</h1>
    <form method="post" enctype="multipart/form-data">
        <label>Selecciona vídeos (MP4):</label>
        <input type="file" name="files" multiple required><br><br>
        <label>Número de capítulos:</label>
        <input type="number" name="chapters" min="1" placeholder="Ej: 5, 10"><br><br>
        <button type="submit">Cortar Vídeos</button>
    </form>

    <h2>Vídeos cortados:</h2>
    <ul>
        {% for video in videos %}
        <li><a href="{{ url_for('download', filename=video) }}">{{ video }}</a></li>
        {% endfor %}
    </ul>
</body>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</html>
