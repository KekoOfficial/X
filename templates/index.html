<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS v18.5 | VELOCIDAD TOTAL</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 2px solid var(--neon); padding: 40px; background: #0a0a0a; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 0 30px var(--neon); }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 30px; }
        .btn-mally { 
            background: var(--neon); color: #000; border: none; padding: 25px; width: 100%; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.2rem;
        }
        #loader { display: none; margin-top: 20px; color: var(--neon); font-size: 0.8rem; }
        .spinner { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MALLY CUTS</h1>
        <form id="fast-form" action="/api/brutal-process" method="POST" enctype="multipart/form-data">
            <input type="file" name="video_file" id="video-input" accept="video/*" style="display: none;" onchange="start()">
            <button type="button" class="btn-mally" id="btn" onclick="document.getElementById('video-input').click()">
                🎬 SELECCIONAR VIDEO
            </button>
        </form>
        <div id="loader">
            <div class="spinner"></div>
            <p>MOTOR V10 DISPARANDO A TELEGRAM...</p>
        </div>
    </div>
    <script>
        function start() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('fast-form').submit();
        }
    </script>
</body>
</html>
