<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cortador de Vídeos Khasam</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🎬 Cortador de Vídeos Khasam</h1>

    <div class="form-container">
        <label>URL del vídeo:</label>
        <input type="text" id="url" placeholder="https://www.dailymotion.com/video/xxxx">

        <label>Duración por capítulo (segundos):</label>
        <select id="duration">
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">60s</option>
        </select>

        <label>Número de capítulos:</label>
        <input type="number" id="chapters" value="5">

        <button onclick="cutVideo()">Cortar vídeo</button>
        <button onclick="clearHist()">Borrar historial</button>
        <button onclick="clearFolder()">Borrar carpeta</button>

        <div id="progress"></div>
    </div>

    <h2>Historial</h2>
    <ul id="historial"></ul>

    <script src="/static/script.js"></script>
</body>
</html>
