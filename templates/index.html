<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS v18.5 | IMPERIO MP</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .panel { border: 2px solid var(--neon); padding: 40px; background: #0a0a0a; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 3px; margin-bottom: 30px; }
        
        .btn-mally { 
            background: var(--neon); color: #000; border: none; padding: 25px; width: 100%; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.2rem;
            box-shadow: 0 0 10px var(--neon);
        }
        .btn-mally:active { transform: scale(0.95); }
        
        #engine-status { display: none; margin-top: 25px; }
        .spinner { border: 5px solid #111; border-top: 5px solid var(--neon); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .blink { animation: blinker 1s linear infinite; color: var(--neon); font-size: 0.8rem; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MALLY CUTS</h1>
        
        <form id="master-form" action="/api/brutal-process" method="POST" enctype="multipart/form-data">
            <input type="file" name="video_file" id="gallery-picker" accept="video/*" style="display: none;" onchange="ignite()">
            <button type="button" class="btn-mally" id="fire-btn" onclick="document.getElementById('gallery-picker').click()">
                🎬 SELECCIONAR VIDEO
            </button>
        </form>

        <div id="engine-status">
            <div class="spinner"></div>
            <p class="blink">MOTOR V10 ACTIVADO: SUBIENDO Y FRAGMENTANDO EN 60s...<br>REVISA TELEGRAM</p>
        </div>
    </div>

    <script>
        function ignite() {
            const file = document.getElementById('gallery-picker').files[0];
            if (file) {
                document.getElementById('fire-btn').style.display = 'none';
                document.getElementById('engine-status').style.display = 'block';
                document.getElementById('master-form').submit();
            }
        }
    </script>
</body>
</html>
