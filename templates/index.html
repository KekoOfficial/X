<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn { border: 2px solid #0f0; background: transparent; color: #0f0; padding: 20px; width: 80%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #status { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div style="text-align: center; width: 100%;">
        <h1>MASTER VIDEO</h1>
        <form id="f" action="/api/brutal-process" method="POST" enctype="multipart/form-data">
            <input type="file" name="video_file" id="v" accept="video/*" style="display: none;" onchange="s()">
            <button type="button" class="btn" id="b" onclick="document.getElementById('v').click()">🎬 SELECCIONAR GALERÍA</button>
        </form>
        <div id="status">🚀 PROCESANDO... MIRA TELEGRAM</div>
    </div>
    <script>
        function s() { document.getElementById('b').style.display='none'; document.getElementById('status').style.display='block'; document.getElementById('f').submit(); }
    </script>
</body>
</html>
