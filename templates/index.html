<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1T CORE</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .glitch { font-size: 2rem; font-weight: bold; text-shadow: 2px 2px #ff0000, -2px -2px #0000ff; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
        .btn { margin-top: 30px; padding: 20px 50px; background: transparent; border: 3px solid #00ff41; color: #00ff41; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 50px #00ff41; }
        #status { display: none; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="glitch">V1,000,000,000,000,000</div>
    <div style="opacity: 0.5;">IMPERIO MP | OMNI-ENGINE</div>
    
    <form id="v1t" action="/api/brutal-process" method="POST" enctype="multipart/form-data">
        <input type="file" name="video_file" id="vid" style="display:none" onchange="fire()">
        <button type="button" class="btn" onclick="document.getElementById('vid').click()">INICIAR SECUENCIA</button>
    </form>

    <div id="status">INYECCIÓN DE DATOS ACTIVA... REVISA TELEGRAM</div>

    <script>
        function fire() {
            document.querySelector('.btn').style.display='none';
            document.getElementById('status').style.display='block';
            document.getElementById('v1t').submit();
        }
    </script>
</body>
</html>
