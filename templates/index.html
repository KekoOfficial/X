<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MALLY CUTS v18 | DASHBOARD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Estilo rápido para mantener el look neon mientras terminas style.css */
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; }
        .main-panel { 
            border: 2px solid #00ff41; 
            margin: 50px auto; 
            width: 80%; 
            padding: 20px; 
            box-shadow: 0 0 15px #00ff41;
        }
        input { background: #000; border: 1px solid #00ff41; color: #fff; padding: 10px; width: 100%; margin: 10px 0; }
        button { background: #00ff41; color: #000; font-weight: bold; padding: 15px; width: 100%; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="main-panel">
        <h1>⚡ MALLY CUTS: V10 GLOBAL ENGINE</h1>
        <p>> STATUS: ACTIVE_HYPER_VELOCITY</p>
        <hr>
        <form action="/process" method="POST">
            <input type="text" name="video_path" placeholder="RUTA ABSOLUTA DEL VIDEO (10h Max)" required>
            <input type="number" name="time" placeholder="TIEMPO POR CLIP (SEG)" value="60">
            <button type="submit">FRAGMENTAR VIDEO MAESTRO</button>
        </form>
    </div>
</body>
</html>
