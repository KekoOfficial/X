<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>MallyCuts 📜</div>
    <div>
        <a href="{{ url_for('index') }}">Upload</a>
        <a href="{{ url_for('history_page') }}">History</a>
    </div>
</div>

<!-- CONTAINER -->
<div class="container">

    <h2>📜 Historial de Videos</h2>

    {% for video in videos %}

    <div class="video-box">
        <h3>🎬 {{ video.name }}</h3>
        <small>{{ video.date }}</small>

        {% for clip in video.clips %}
            <br>
            <a href="{{ url_for('download_file', filename=clip) }}">
                📥 Descargar {{ clip }}
            </a>
        {% endfor %}
    </div>

    {% endfor %}

</div>

</body>
</html>
