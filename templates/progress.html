<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MallyCuts | Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-container monitor">
        <h2>ESTADO DEL <span class="highlight">MOTOR</span></h2>
        <div class="status-badge processing" id="status-text">PROCESANDO...</div>
        <div class="progress-bar-bg">
            <div id="bar" class="progress-bar"></div>
        </div>
        <p id="part-count" style="margin-top:15px;">Parte: 0 / 0</p>
        <div class="log-box" id="logs">
            <p>> Conexión establecida con el bot...</p>
        </div>
        <a href="/" class="btn-back" style="display:block; margin-top:20px; color:var(--accent);">Subir otro</a>
    </div>
    <script>
        const jobId = window.location.pathname.split('/').pop();
        async function update() {
            const res = await fetch(`/api/status/${jobId}`);
            const data = await res.json();
            if (data.status === "processing") {
                let p = (data.current_part / data.total_parts) * 100;
                document.getElementById('bar').style.width = p + "%";
                document.getElementById('part-count').innerText = `Parte: ${data.current_part} / ${data.total_parts}`;
            } else if (data.status === "completed") {
                document.getElementById('status-text').innerText = "COMPLETADO";
                document.getElementById('bar').style.width = "100%";
                return;
            }
            setTimeout(update, 2000);
        }
        update();
    </script>
</body>
</html>
