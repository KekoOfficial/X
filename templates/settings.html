<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS DATABASE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='settings.css') }}">
</head>
<body>
    <div class="settings-card">
        <div class="header"><h3>NEXUS DATABASE</h3></div>
        <div class="input-group">
            <label>BOT TOKEN</label>
            <input type="text" id="bot-token" placeholder="Token de Telegram">
        </div>
        <div class="input-group">
            <label>CHAT ID / CANAL</label>
            <input type="text" id="chat-id" placeholder="-100xxxxxxxxxx">
        </div>
        <button class="save-btn" onclick="save()">ACTUALIZAR BASE DE DATOS</button>
    </div>

    <script>
        async function save() {
            const data = {
                bot_token: document.getElementById('bot-token').value,
                chat_id: document.getElementById('chat-id').value
            };
            const res = await fetch("/api/save_settings", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });
            if(res.ok) window.location.href = "/";
        }
    </script>
</body>
</html>
