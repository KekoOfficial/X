<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS DB</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='settings.css') }}">
</head>
<body>
    <div class="settings-card">
        <h3>NEXUS DATABASE</h3>
        <input type="text" id="tk" placeholder="BOT TOKEN">
        <input type="text" id="id" placeholder="CHAT ID">
        <button class="save-btn" onclick="save()">GUARDAR CAMBIOS</button>
    </div>
    <script>
        async function save() {
            const res = await fetch("/api/save_settings", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({bot_token: document.getElementById('tk').value, chat_id: document.getElementById('id').value})
            });
            if(res.ok) window.location.href = "/";
        }
    </script>
</body>
</html>
