<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts | Imperial Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>🎬 MALLY<span class="highlight">CUTS</span></h1>
            <p class="subtitle">Segmentación Imperial v2.0</p>
        </header>

        <div id="step-1" class="panel">
            <div class="drop-zone" onclick="document.getElementById('video-input').click()">
                <input type="file" id="video-input" hidden accept="video/*">
                <div class="icon">🚀</div>
                <p>Selecciona el video maestro</p>
            </div>
            <button id="btn-analyze" class="btn-primary" onclick="analizarVideo()">ANALIZAR SISTEMA</button>
        </div>

        <div id="step-2" class="panel hidden">
            <div class="video-info">
                <p>📁 <span id="info-name"></span></p>
                <p>⏱️ <span id="info-dur"></span> | ⚖️ <span id="info-size"></span></p>
            </div>
            <div class="selection-box">
                <label>Protocolo de Corte:</label>
                <div class="options-grid" id="options-container"></div>
            </div>
            <button id="btn-confirm" class="btn-confirm" onclick="iniciarCorte()">INICIAR GENERACIÓN</button>
        </div>
    </div>

    <script>
        let currentFileId = "";
        async function analizarVideo() {
            const file = document.getElementById('video-input').files[0];
            if (!file) return;
            document.getElementById('btn-analyze').innerText = "ANALIZANDO...";
            let formData = new FormData();
            formData.append("video", file);
            const res = await fetch("/api/analyze", { method: "POST", body: formData });
            const data = await res.json();
            currentFileId = data.file_id;
            document.getElementById('info-name').innerText = data.details.name || file.name;
            document.getElementById('info-dur').innerText = data.details.duration + "s";
            document.getElementById('info-size').innerText = data.details.size_mb + "MB";
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            for (let key in data.predict) {
                let opt = data.predict[key];
                container.innerHTML += `<div class="opt-card" onclick="selectOpt(this, ${opt.sec})"><b>${key}</b><br><small>${opt.parts} partes</small></div>`;
            }
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }
        let selectedSeconds = 300;
        function selectOpt(el, sec) {
            document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedSeconds = sec;
        }
        async function iniciarCorte() {
            const res = await fetch("/api/execute", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ file_id: currentFileId, seconds: selectedSeconds })
            });
            const data = await res.json();
            window.location.href = `/progress_page/${data.job_id}`;
        }
    </script>
</body>
</html>
