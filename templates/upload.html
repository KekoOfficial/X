<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY NITRO v14.5</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='upload.css') }}">
</head>
<body>
    <div class="glass-container">
        <a href="/settings" class="nexus-btn">⚙️ NEXUS DATABASE</a>
        <h1>MALLY <span class="cyan">NITRO v14.5</span></h1>
        
        <div id="upload-zone" class="drop-zone" onclick="document.getElementById('file-in').click()">
            <input type="file" id="file-in" hidden onchange="runNitro()">
            <div class="bolt">⚡</div>
            <p>SUBIR VIDEO MAESTRO</p>
        </div>

        <div id="monitor-box" class="monitor-box" style="display:none;">
            <div class="mon-header">🛰️ MONITOR DE RÁFAGA</div>
            <div id="status-text" class="log-text">Sincronizando...</div>
            <div class="progress-bg"><div id="progress-bar"></div></div>
        </div>
    </div>

    <script>
        const source = new EventSource("/api/status");
        source.onmessage = (e) => {
            const monitor = document.getElementById('monitor-box');
            const log = document.getElementById('status-text');
            const bar = document.getElementById('progress-bar');
            
            monitor.style.display = 'block';
            log.innerText = e.data;
            
            if(e.data.includes("ENVIANDO")) bar.style.width = "60%";
            if(e.data.includes("COMPLETADA")) {
                bar.style.width = "100%";
                bar.style.background = "#00ff88";
                setTimeout(() => window.location.reload(), 3000);
            }
        };

        async function runNitro() {
            const file = document.getElementById('file-in').files[0];
            const fd = new FormData(); fd.append("video", file);
            document.getElementById('upload-zone').style.opacity = '0.3';
            await fetch("/api/upload_mally", {method: "POST", body: fd});
        }
    </script>
</body>
</html>
