<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY NEXUS | CONSOLA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='upload.css') }}">
</head>
<body>

    <a href="/settings" class="nexus-btn-settings">⚙️ CONFIGURACIÓN NEXUS</a>

    <div class="glass-container">
        <header>
            <h1>MALLY <span class="highlight">CUTS v13</span></h1>
            <p class="brand">KHASSAMX DEV EDITION</p>
        </header>
        
        <main id="ui-container">
            <div class="drop-zone" id="drop-zone" onclick="document.getElementById('video-input').click()">
                <input type="file" id="video-input" hidden accept="video/*" onchange="iniciarProceso()">
                <div class="icon-pulse">⚡</div>
                <p>SOLTAR VIDEO MAESTRO</p>
                <small>Formatos: MP4, MKV, MOV</small>
            </div>
        </main>

        <div id="status-console" style="display: none;">
            <div class="loader"></div>
            <p class="status-text">FRAGMENTANDO SERIE...</p>
            <p class="target-info">Destino: @MallySeries</p>
        </div>
    </div>

    <script>
        async function iniciarProceso() {
            const input = document.getElementById('video-input');
            if (input.files.length === 0) return;

            const file = input.files[0];
            const ui = document.getElementById('ui-container');
            const console = document.getElementById('status-console');

            // Cambio visual a modo "Procesando"
            ui.style.display = 'none';
            console.style.display = 'block';

            const formData = new FormData();
            formData.append("video", file);

            try {
                const response = await fetch("/api/upload_mally", {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    alert("🔥 Motor Mally v13 Iniciado con éxito.\nRevisa el canal @MallySeries.");
                    // Resetear para nueva subida
                    window.location.reload();
                } else {
                    alert("❌ Error en la Consola. Revisa los Logs.");
                }
            } catch (error) {
                alert("❌ Fallo de conexión con el servidor.");
            }
        }
    </script>
</body>
</html>
