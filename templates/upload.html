<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY NEXUS v13</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='upload.css') }}">
</head>
<body>
    <div class="glass-container">
        <a href="/settings" class="nexus-btn">⚙️ CONFIGURACIÓN NEXUS</a>
        <h1 style="margin-top:20px;">MALLY <span style="color:#00f2ff;">CUTS v13</span></h1>
        <p style="font-size:9px; color:#444; letter-spacing:3px;">KHASSAMX DEV</p>
        
        <div id="ui-main">
            <div class="drop-zone" onclick="document.getElementById('video-input').click()">
                <input type="file" id="video-input" hidden onchange="start()">
                <div style="font-size:40px; color:#ffcc00;">⚡</div>
                <p>SUBIR VIDEO MAESTRO</p>
            </div>
        </div>
        <div id="ui-loader" style="display:none;">
            <div class="spinner"></div>
            <p>FRAGMENTANDO SERIE...</p>
        </div>
    </div>
    <script>
        async function start() {
            const file = document.getElementById('video-input').files[0];
            document.getElementById('ui-main').style.display='none';
            document.getElementById('ui-loader').style.display='block';
            const fd = new FormData(); fd.append("video", file);
            await fetch("/api/upload_mally", { method: "POST", body: fd });
            alert("🔥 MOTOR INICIADO"); window.location.reload();
        }
    </script>
</body>
</html>
