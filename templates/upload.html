<div class="glass-container">
    <div class="settings-trigger" onclick="document.getElementById('mally-modal').style.display='flex'">⚙️ AJUSTES NEXUS</div>

    <h1>MALLY <span class="highlight">CUTS v13</span></h1>
    <p class="subtitle">CONSOLA KHASSAMX DEV</p>
    
    <div id="upload-ui">
        <div class="drop-zone" onclick="document.getElementById('video-input').click()">
            <input type="file" id="video-input" hidden onchange="enviarMally()">
            <span class="icon">⚡</span>
            <p>SUBIR VIDEO MAESTRO</p>
        </div>
    </div>
</div>

<div id="mally-modal" class="modal">
    <div class="modal-content">
        <h3>⚙️ CONFIGURACIÓN PRIVADA</h3>
        <input type="text" id="bot-token" placeholder="PEGA AQUÍ EL TOKEN DEL BOT">
        <input type="text" id="chat-id" placeholder="ID DEL CANAL O GRUPO">
        <button onclick="guardarConfig()">GUARDAR EN BASE DE DATOS</button>
        <button onclick="document.getElementById('mally-modal').style.display='none'" style="background:transparent; border:1px solid #333; margin-top:10px;">CERRAR</button>
    </div>
</div>

<script>
async function guardarConfig() {
    const data = {
        bot_token: document.getElementById('bot-token').value,
        chat_id: document.getElementById('chat-id').value
    };
    const res = await fetch("/api/save_settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });
    if(res.ok) alert("Configuración Guardada Correctamente");
}
</script>
