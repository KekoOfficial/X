<!DOCTYPE html>
<html>
<head>
    <title>MallyCuts Pro</title>
    <style> ... </style> 
</head>
<body>
    <div class="glass-container">
        <h1>MALLY<span class="highlight">CUTS PRO</span></h1>
        
        <div id="upload-box">
            <div class="settings-row">
                <select id="time-select" class="pro-input">
                    <option value="60">Cortes de 1 Minuto</option>
                    <option value="300">Cortes de 5 Minutos</option>
                </select>
                <label style="font-size: 14px;">
                    <input type="checkbox" id="silent-mode"> 🤫 Silencio
                </label>
            </div>

            <div class="drop-zone" onclick="document.getElementById('video-input').click()">
                <input type="file" id="video-input" hidden onchange="iniciarSistema()">
                <div class="icon">⚡</div>
                <p>SUBIR VIDEO MAESTRO</p>
            </div>
        </div>

        <div id="status-pro" style="display:none;">
            <div class="pro-loader"></div>
            <p id="msg-pro">PROCESANDO SECUENCIA...</p>
        </div>
    </div>
</body>
</html>
