<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MallyCuts - Subida</title>
    <link rel="stylesheet" href="/static/upload.css">
</head>
<body>
    <div class="main-container">
        <div class="upload-card">
            <h1>🎬 MallyCuts <span class="pro-tag">PRO</span></h1>
            <p>Divide tus videos y recíbelos en Telegram al instante.</p>
            
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="file-input-wrapper">
                    <input type="file" name="video" id="video" accept="video/*" required>
                    <label for="video">📁 Seleccionar Video</label>
                </div>

                <div class="options-group">
                    <label>Frecuencia de corte:</label>
                    <select name="time_choice">
                        <option value="180">Cada 3 Minutos</option>
                        <option value="300" selected>Cada 5 Minutos</option>
                        <option value="600">Cada 10 Minutos</option>
                    </select>
                </div>

                <button type="submit" class="btn-start">Iniciar Proceso 🚀</button>
            </form>
        </div>
    </div>
</body>
</html>
