<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descargar por Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{% include 'components/navbar.html' %}

<div class="container">
    <h2>Descargar Video por Link</h2>
    <form id="linkForm" method="POST" action="{{ url_for('link_download') }}">
        <input type="text" name="video_url" placeholder="Ingrese URL del vídeo" required>
        <input type="number" name="chapters" placeholder="Número de capítulos" min="1" required>
        <input type="number" name="duration" placeholder="Duración por capítulo (s)" min="1" required>
        <input type="submit" value="Cortar Video">
    </form>
    <div class="progress-container">
        <div class="progress-bar">0%</div>
    </div>
</div>

{% include 'components/footer.html' %}
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
