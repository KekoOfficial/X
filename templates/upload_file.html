<form action="/upload" method="POST" enctype="multipart/form-data">
    <label>Selecciona un video:</label>
    <input type="file" name="video_file" required>

    <label>Duración de cada capítulo (segundos):</label>
    <input type="number" name="duration" value="60" required>

    <button type="submit">Subir y Cortar Automáticamente</button>
</form>
